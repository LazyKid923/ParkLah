name: Update parking rates

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  RUN_EVERY_WEEKS: "1"

jobs:
  update-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Decide whether to run this week
        id: cadence
        run: |
          weeks="${RUN_EVERY_WEEKS}"
          if [ "$weeks" = "1" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          iso_week="$(date -u +%V)"
          if [ $((10#$iso_week % weeks)) -eq 0 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Scrape latest rates
        if: steps.cadence.outputs.run == 'true'
        run: |
          python fetch_motorist_rates.py --output parking_rates/CarparkRates.new.csv

      - name: Validate scraped output
        if: steps.cadence.outputs.run == 'true'
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          old_file = Path("parking_rates/CarparkRates.csv")
          new_file = Path("parking_rates/CarparkRates.new.csv")

          if not new_file.exists():
            raise SystemExit("New CSV not generated.")

          with old_file.open(newline="", encoding="utf-8") as f:
            old_reader = csv.reader(f)
            old_header = next(old_reader, [])
            old_rows = sum(1 for _ in old_reader)

          with new_file.open(newline="", encoding="utf-8") as f:
            new_reader = csv.reader(f)
            new_header = next(new_reader, [])
            new_rows = sum(1 for _ in new_reader)

          header_set = set(new_header)
          required = {
            "carpark",
            "address",
            "postal_code",
            "saturday_rate",
            "sunday_publicholiday_rate",
          }
          if not required.issubset(header_set):
            raise SystemExit(f"New CSV header missing required columns. Header: {new_header}")
          if not ({"weekdays_rate_1", "weekdays_rate"} & header_set):
            raise SystemExit(
              f"New CSV header must include weekdays_rate_1 or weekdays_rate. Header: {new_header}"
            )

          if new_rows == 0:
            raise SystemExit("New CSV has zero data rows.")
          PY

      - name: Replace CSV with validated output
        if: steps.cadence.outputs.run == 'true'
        run: |
          mv parking_rates/CarparkRates.new.csv parking_rates/CarparkRates.csv

      - name: Create pull request if changed
        if: steps.cadence.outputs.run == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update parking rates"
          title: "chore: update parking rates"
          body: |
            Automated update from scheduled workflow.
          branch: "chore/update-parking-rates"
          delete-branch: true
          add-paths: |
            parking_rates/CarparkRates.csv
