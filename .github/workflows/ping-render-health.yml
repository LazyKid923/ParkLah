name: Ping Render health

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /api/status
        env:
          HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
        run: |
          url="${HEALTH_URL:-https://parklah.onrender.com/api/status}"
          echo "Pinging ${url}"
          curl -fsS --max-time 20 "$url" > /tmp/render-health.json
          wc -c /tmp/render-health.json
