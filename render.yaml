services:
  - type: web
    name: parklah-backend
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python serve_live_map.py --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: LTA_DATAMALL_ACCOUNT_KEY
        sync: false
      - key: URA_ACCESS_KEY
        sync: false
