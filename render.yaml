services:
  - type: web
    name: parklah-backend
    runtime: python
    plan: free
    region: singapore
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python serve_live_map.py --host 0.0.0.0 --port $PORT --no-lta-match-debug-log"
    healthCheckPath: /api/status
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: LTA_DATAMALL_ACCOUNT_KEY
        sync: false
      - key: URA_ACCESS_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_CACHE_TABLE
        value: parklah_api_cache
      - key: SUPABASE_CACHE_TTL_SEC
        value: "180"
      - key: SUPABASE_TIMEOUT_SEC
        value: "3"
